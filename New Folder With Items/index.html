<!DOCTYPE html>
<html lang="en">
<head>
    <title>To-do App</title>
     <link rel="stylesheet" href="style.css"> 
</head>
<body style="background-color: rgb(251, 145, 205);">

    <article class="post">
    <h1 style="font-family: 'Times New Roman', Times, serif;">To-Do App</h1>

    <nav class="nav ul">
    <ul>
        <li><a href="#Home">Home</a></li>
        <li><a href="#Past Reminders">Past Reminders</a></li>
</nav>
 
<div class="button">
    <button type="mark" style="background-color: rgb(50, 80, 145);">Mark all as complete</button>
</div>
 
<div class="input-container">
    <input type="text" placeholder="Enter a task...">
    <button>Add Task</button>
</div>
   
 
<div class="task">
    <input type="checkbox">
            <span>Buy groceries</span>
</div>
 
<div class="task">
    <input type="checkbox">
            <span>Finish homework</span>
</div>
 
<div class="task">
    <input type="checkbox" checked>
            <span>Call mom </span>
</div>
 
<div class="task">
    <input type="checkbox">
            <span>Exercise</span>
</div>
 
<div class="container-speak">
    <button class="speak" style="background-color: rgb(9, 112, 160);">🎤</button>
</div>


</article>

<footer>
    <p style="color: rgb(24, 72, 2); font-size: smaller;">To-Do App 2026 | &copy;</p>
</footer>
 
    
</body>
</html>
